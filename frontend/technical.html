<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Technical Coding Round</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard-container">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <h2 class="logo">
      InterviewIQ AI
    </h2>

    <ul>

      <li>
        <a href="index.html">
          🏠 Home
        </a>
      </li>

      <li>
        <a href="dashboard.html">
          📊 Dashboard
        </a>
      </li>

      <li>
        <a href="resume.html">
          📄 Resume Analyzer
        </a>
      </li>

      <li>
        <a href="hr.html">
          🎤 HR Interview
        </a>
      </li>

      <li>
        <a href="technical.html">
          💻 Technical Round
        </a>
      </li>

    </ul>

  </div>

  <!-- MAIN -->

  <div class="main-content">

    <h1>
      Technical Coding Round
    </h1>

    <p>
      Solve coding challenges and improve technical skills
    </p>

    <!-- QUESTION -->

    <div class="chart-card mt-5">

      <h3>
        Coding Question
      </h3>

      <p class="mt-3">

        Write a program to reverse a string.

      </p>

    </div>

    <!-- LANGUAGE -->

    <div class="mt-4">

      <label>
        Select Language
      </label>

      <select class="form-control mt-2">

        <option>Python</option>

        <option>Java</option>

        <option>C++</option>

        <option>JavaScript</option>

      </select>

    </div>

    <!-- CODE EDITOR -->

    <div class="mt-4">

      <textarea
      class="form-control"
      rows="12"
      placeholder="Write your code here...">
      </textarea>

    </div>

    <!-- BUTTONS -->

    <div class="mt-4">

      <button
      class="btn btn-primary me-3"
      onclick="runCode()">

      Run Code

      </button>

      <button
      class="btn btn-success"
      onclick="submitCode()">

      Submit

      </button>

    </div>

    <!-- OUTPUT -->

    <div
    id="output"
    class="chart-card mt-5"
    style="display:none;">

    </div>

  </div>

</div>

<script>

function runCode(){

    const output =
    document.getElementById("output");

    output.style.display = "block";

    output.innerHTML = `

        <h3>Code Output</h3>

        <p class="mt-3">

        Program executed successfully.

        </p>

    `;
}

function submitCode(){

    const output =
    document.getElementById("output");

    output.style.display = "block";

    output.innerHTML = `

        <h3>AI Technical Feedback</h3>

        <h1 class="mt-3">
        88%
        </h1>

        <p class="mt-3">

        Good logic and syntax.
        Improve optimization and readability.

        </p>

    `;
}

</script>

</body>
</html>
