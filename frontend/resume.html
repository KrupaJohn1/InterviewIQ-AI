<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Resume Analyzer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(
                135deg,
                #0f172a,
                #6d28d9
            );

        }

        .container{

            width:500px;

            background:rgba(255,255,255,0.1);

            padding:40px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:0 8px 20px rgba(0,0,0,0.3);

            color:white;

        }

        h1{

            text-align:center;

            margin-bottom:20px;

            font-size:42px;

        }

        p{

            text-align:center;

            margin-bottom:30px;

            color:#ddd;

        }

        input[type="file"]{

            width:100%;

            padding:15px;

            background:white;

            border:none;

            border-radius:10px;

            margin-bottom:20px;

            cursor:pointer;

        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:10px;

            background:#2563eb;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;

        }

        button:hover{

            background:#1d4ed8;

        }

        #result{

            margin-top:30px;

            background:rgba(255,255,255,0.1);

            padding:20px;

            border-radius:15px;

        }

        #result h2{

            margin-bottom:15px;

            color:#4ade80;

        }

        #result h3{

            margin-bottom:10px;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>
        AI Resume Analyzer
    </h1>

    <p>
        Upload your resume and get ATS analysis instantly
    </p>

    <input type="file" id="resumeFile">

    <button onclick="uploadResume()">
        Analyze Resume
    </button>

    <div id="result"></div>

</div>

<script>

async function uploadResume(){

    const fileInput =
        document.getElementById("resumeFile");

    const file = fileInput.files[0];

    if(!file){

        alert("Please select file");

        return;
    }

    const formData = new FormData();

    formData.append("resume", file);

    try{

        const response = await fetch(

            "http://127.0.0.1:5000/analyze_resume",

            {
                method: "POST",
                body: formData
            }

        );

        const data = await response.json();

        document.getElementById("result").innerHTML = `

            <h2>
                ATS Score: ${data.ats_score}%
            </h2>

            <h3>
                Skills Detected:
            </h3>

            <p>
                ${data.skills.join(", ")}
            </p>

        `;

    }

    catch(error){

        console.log(error);

        alert("Backend connection error");

    }

}

</script>

</body>

</html>
