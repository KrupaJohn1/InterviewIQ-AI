<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Register - InterviewIQ AI</title>

  <!-- Bootstrap -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

  <div class="login-card">

    <h1 class="text-center mb-4">
      Create Account
    </h1>

    <p class="text-center text-light mb-4">
      Register to start your AI interview preparation
    </p>

    <form>

      <!-- FULL NAME -->

      <div class="mb-3">

        <label class="mb-2">
          Full Name
        </label>

        <input
          type="text"
          class="form-control"
          placeholder="Enter your full name"
        >

      </div>

      <!-- EMAIL -->

      <div class="mb-3">

        <label class="mb-2">
          Email
        </label>

        <input
          type="email"
          class="form-control"
          placeholder="Enter your email"
        >

      </div>

      <!-- PASSWORD -->

      <div class="mb-4">

        <label class="mb-2">
          Password
        </label>

        <input
          type="password"
          class="form-control"
          placeholder="Create password"
        >

      </div>

      <!-- REGISTER BUTTON -->

      <button
        type="button"
        onclick="showSuccess()"
        class="btn btn-primary w-100 btn-lg">

        Register

      </button>

    </form>

    <!-- LOGIN LINK -->

    <div class="text-center mt-4">

      <p>

        Already have an account?

        <a
          href="login.html"
          class="text-info fw-bold">

          Login

        </a>

      </p>

    </div>

  </div>

</div>

<!-- SUCCESS SCRIPT -->

<script>

function showSuccess() {

    // GET EMAIL

    const email =
    document.querySelector(
      'input[type="email"]'
    ).value;

    // VALIDATE EMAIL

    if(email === "") {

        alert(
          "⚠️ Please enter your email"
        );

        return;
    }

    // SUCCESS MESSAGE

    alert(

      "🎉 Registration Successful!\n\n" +

      "Registered Email:\n" +

      email +

      "\n\nWelcome to InterviewIQ AI 🚀"

    );

    // REDIRECT TO LOGIN

    window.location.href =
    "login.html";
}

</script>

</body>

</html>
