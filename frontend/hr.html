<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>AI HR Interview</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="resume-container">

  <div class="resume-card">

    <div class="d-flex justify-content-between">

      <h1>
        AI HR Interview
      </h1>

      <a
      href="dashboard.html"
      class="btn btn-outline-light">

      Back

      </a>

    </div>

    <p class="mt-3">

      Practice HR interviews with AI-generated feedback

    </p>

    <div class="mt-5">

      <h3 id="question">

        Tell me about yourself

      </h3>

      <textarea
      id="answer"
      class="form-control mt-4"
      rows="6"
      placeholder="Type your answer here">
      </textarea>

      <button
      class="btn btn-primary mt-4 w-100"
      onclick="submitAnswer()">

      Submit Answer

      </button>

    </div>

    <div
    id="feedback"
    class="chart-card mt-5"
    style="display:none;">

    </div>

  </div>

</div>

<script>

const questions = [

    "Tell me about yourself",

    "Why should we hire you?",

    "What are your strengths?",

    "What are your weaknesses?",

    "Where do you see yourself in 5 years?",

    "Describe a challenge you faced",

    "Why do you want this job?"

];

function randomQuestion(){

    const randomIndex =
    Math.floor(Math.random() * questions.length);

    document.getElementById("question")
    .innerText = questions[randomIndex];

}

function submitAnswer(){

    const answer =
    document.getElementById("answer").value;

    let score = 0;

    let feedback = "";

    if(answer.length > 150){

        score = 95;

        feedback =
        "Excellent answer with strong communication and explanation.";

    }

    else if(answer.length > 80){

        score = 80;

        feedback =
        "Good answer. Try adding more confidence and examples.";

    }

    else if(answer.length > 30){

        score = 65;

        feedback =
        "Average answer. Try explaining more clearly.";

    }

    else{

        score = 40;

        feedback =
        "Answer too short. Add more details and confidence.";

    }

    const feedbackBox =
    document.getElementById("feedback");

    feedbackBox.style.display = "block";

    feedbackBox.innerHTML = `

        <h3>AI Feedback</h3>

        <h1 class="mt-3">${score}%</h1>

        <p class="mt-3">

        ${feedback}

        </p>

        <button
        class="btn btn-success mt-3"
        onclick="nextQuestion()">

        Next Question

        </button>

    `;

}

function nextQuestion(){

    randomQuestion();

    document.getElementById("answer").value = "";

    document.getElementById("feedback")
    .style.display = "none";

}

</script>

</body>
</html>
